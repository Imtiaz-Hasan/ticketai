version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ticketai
      POSTGRES_PASSWORD: ticketai_password
      POSTGRES_DB: ticketai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketai"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://ticketai:ticketai_password@db:5432/ticketai"
      NEXTAUTH_SECRET: "your-production-secret-change-me"
      NEXTAUTH_URL: "http://localhost:3000"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
